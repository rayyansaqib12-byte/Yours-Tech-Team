  <body>
    <div id="root"></div>

    <!--
      Meta Pixel. Kept in <body>, not <head>: a <noscript><img> is not valid inside <head>
      (it made the HTML unparseable at build time), and running the tag before <meta charset>
      delayed first paint for a tracking script.
    -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '3332589343587170');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=3332589343587170&ev=PageView&noscript=1"
      alt="" /></noscript>
    <!-- End Meta Pixel Code -->
    
    <!-- GoHighLevel Form Embed Script - loaded async for performance -->
    <script src="https://link.mevan.ai/js/form_embed.js" async></script>
  </body>
